<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Graph Viewer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: #e2e8f0;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .graph-viewer {
        background: #1e293b;
        border-radius: 8px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .viewer-header {
        background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%);
        padding: 24px;
        border-bottom: 1px solid #334155;
      }

      .viewer-header h2 {
        font-size: 24px;
        margin-bottom: 12px;
        color: #fff;
      }

      .viewer-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
      }

      .stat {
        display: inline-block;
        background: rgba(71, 158, 255, 0.1);
        border: 1px solid #4a9eff;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 500;
      }

      .viewer-controls {
        display: flex;
        gap: 12px;
        padding: 16px;
        background: #0f172a;
        border-bottom: 1px solid #334155;
        flex-wrap: wrap;
        align-items: center;
      }

      .search-input {
        flex: 1;
        min-width: 200px;
        padding: 8px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 4px;
        color: #e2e8f0;
        font-size: 13px;
      }

      .search-input::placeholder {
        color: #64748b;
      }

      .search-input:focus {
        outline: none;
        border-color: #4a9eff;
        box-shadow: 0 0 0 3px rgba(74, 158, 255, 0.1);
      }

      .filter-select {
        padding: 8px 12px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 4px;
        color: #e2e8f0;
        font-size: 13px;
        cursor: pointer;
      }

      .filter-select:focus {
        outline: none;
        border-color: #4a9eff;
      }

      .result-count {
        font-size: 12px;
        color: #94a3b8;
        white-space: nowrap;
      }

      .viewer-tabs {
        display: flex;
        gap: 0;
        background: #0f172a;
        border-bottom: 1px solid #334155;
        padding: 0;
      }

      .tab-button {
        flex: 1;
        padding: 12px 16px;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        color: #94a3b8;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
        text-align: center;
      }

      .tab-button:hover {
        background: rgba(71, 158, 255, 0.05);
        color: #cbd5e1;
      }

      .tab-button.active {
        background: rgba(71, 158, 255, 0.1);
        border-bottom-color: #4a9eff;
        color: #4a9eff;
      }

      .tab-content {
        display: none;
        padding: 16px;
        overflow-x: auto;
      }

      .tab-content.active {
        display: block;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      thead {
        background: #0f172a;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      th {
        padding: 12px;
        text-align: left;
        font-weight: 600;
        color: #cbd5e1;
        border-bottom: 2px solid #334155;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #334155;
      }

      tr:hover {
        background: rgba(71, 158, 255, 0.05);
      }

      code {
        background: rgba(0, 0, 0, 0.2);
        padding: 2px 6px;
        border-radius: 3px;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 12px;
        color: #74d9ff;
      }

      .type-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .calls-badge {
        display: inline-block;
        background: rgba(100, 200, 100, 0.2);
        border: 1px solid #64c864;
        color: #64c864;
        padding: 4px 8px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 500;
      }

      .no-results {
        text-align: center;
        padding: 32px 16px;
        color: #64748b;
        font-size: 14px;
      }

      .error-message {
        padding: 24px;
        background: #7f1d1d;
        border: 1px solid #991b1b;
        border-radius: 8px;
        color: #fca5a5;
        text-align: center;
        font-weight: 500;
      }

      .node-row code {
        color: #74d9ff;
      }

      strong {
        color: #f1f5f9;
      }

      @media (max-width: 768px) {
        .viewer-stats {
          grid-template-columns: 1fr;
        }

        .viewer-controls {
          flex-direction: column;
          align-items: stretch;
        }

        .search-input {
          min-width: 100%;
        }

        .tab-button {
          padding: 10px 8px;
          font-size: 12px;
        }

        th, td {
          padding: 8px;
          font-size: 12px;
        }

        code {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="viewer-root"></div>
    </div>

    <script type="module">
      import { GraphViewer } from '/src/GraphViewer.ts';

      // Initialize viewer
      const viewer = new GraphViewer('#viewer-root');
      
      // Load graph data
      viewer.loadGraph('/unitcircle/graph.json');
    </script>
  </body>
</html>
